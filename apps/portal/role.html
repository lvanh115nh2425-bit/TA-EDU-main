<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hoàn tất thông tin tài khoản | TA-Edu</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/taedu_global.css">
  <link rel="stylesheet" href="css/css_onboarding.css">
  <link rel="stylesheet" href="css/css_menu.css">
  <script>
    window.__TAEDU_ADMIN_API__ = window.__TAEDU_ADMIN_API__ || "http://localhost:4001";
  </script>
  <script defer type="module" src="js/core/firebase.js"></script>
  <script defer src="/js/core/boot_header.js?v=20260330"></script>
  <script defer type="module" src="js/modules/onboarding.js?v=20260329"></script>
</head>
<body>
  <main class="ob">
    <section class="ob__card" data-step="profile">
      <header class="ob__head">
        <span class="ob__eyebrow">Bước cuối để vào hệ thống</span>
        <h1>Hoàn tất thông tin tài khoản</h1>
        <p>Chỉ cần điền thông tin cơ bản bên dưới là bạn có thể dùng hệ thống ngay, không cần chờ admin xác nhận.</p>
      </header>

      <form id="profileForm" class="ob__form">
        <fieldset class="ob__section">
          <legend>Chọn vai trò</legend>
          <div class="ob__grid">
            <label class="ob__role">
              <input type="radio" name="role" value="student" required>
              <span class="ob__role-badge"><i class="fa-solid fa-user-graduate"></i></span>
              <strong>Học sinh</strong>
              <span>Dành cho học viên tham gia học tập, làm bài và theo dõi tiến độ.</span>
            </label>
            <label class="ob__role">
              <input type="radio" name="role" value="teacher" required>
              <span class="ob__role-badge"><i class="fa-solid fa-chalkboard-user"></i></span>
              <strong>Giáo viên</strong>
              <span>Dành cho giáo viên hướng dẫn, chia sẻ nội dung và quản lý học tập.</span>
            </label>
          </div>
        </fieldset>

        <div class="row">
          <label>
            Biệt danh
            <input required name="display_name" placeholder="Tên hiển thị ở mọi nơi">
          </label>
          <label>
            Họ và tên
            <input required name="full_name" placeholder="Nhập họ và tên đầy đủ">
          </label>
        </div>

        <div class="row">
          <label>
            Lớp
            <div class="grade-picker" data-grade-picker>
              <button type="button" class="grade-picker__toggle" data-grade-toggle aria-haspopup="listbox" aria-expanded="false">
                <span data-grade-label>Chọn lớp</span>
                <i class="fa-solid fa-chevron-down"></i>
              </button>
              <ul class="grade-picker__list" data-grade-list role="listbox" hidden>
                <li><button type="button" data-grade-option="" class="is-selected">Chọn lớp</button></li>
                <li><button type="button" data-grade-option="10">Lớp 10</button></li>
                <li><button type="button" data-grade-option="11">Lớp 11</button></li>
                <li><button type="button" data-grade-option="12">Lớp 12</button></li>
              </ul>
              <select required name="student_grade" class="grade-picker__native">
                <option value="">Chọn lớp</option>
                <option value="10">Lớp 10</option>
                <option value="11">Lớp 11</option>
                <option value="12">Lớp 12</option>
              </select>
            </div>
          </label>
          <label>
            Email
            <input required type="email" name="email" placeholder="tenban@gmail.com" readonly>
          </label>
          <label>
            Số điện thoại
            <input required type="tel" name="student_phone" inputmode="tel" pattern="^[0-9 +()-]{8,15}$" placeholder="Nhập số điện thoại">
          </label>
        </div>

        <label class="agree">
          <input type="checkbox" name="privacy_commitment" required>
          <span>Chúng tôi cam kết các thông tin cá nhân của bạn sẽ được bảo mật.</span>
        </label>

        <div class="actions">
          <a href="index.html" class="btn ghost">Về trang chủ</a>
          <button type="submit" class="btn primary">Lưu hồ sơ</button>
        </div>
      </form>
    </section>

    <section class="ob__card ob__card--success" data-step="success" hidden>
      <header class="ob__head">
        <span class="ob__eyebrow">Hoàn tất</span>
        <h1>Thông tin đã được lưu</h1>
        <p>Bạn có thể vào hệ thống ngay bây giờ.</p>
      </header>
      <div class="actions actions--center">
        <a href="dashboard.html" class="btn primary">Vào Dashboard</a>
      </div>
    </section>
  </main>
</body>
</html>

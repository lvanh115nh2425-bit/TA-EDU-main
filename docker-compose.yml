version: "3.9"
services:
  kyc-db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: taedu
      POSTGRES_USER: taedu
      POSTGRES_PASSWORD: taedu
    ports:
      - "5434:5432"
    volumes:
      - kyc-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taedu"]
      interval: 10s
      timeout: 5s
      retries: 5

  kyc-admin-api:
    build: ./services/kyc-admin-api
    env_file:
      - ./services/kyc-admin-api/.env
    environment:
      PORT: 4001
      EMBEDDING_DIM: "384"
      DATABASE_URL: postgres://taedu:taedu@kyc-db:5432/taedu
      JWT_SECRET: super-secret-change-me
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin123
      ALLOWED_ORIGINS: >
        http://localhost:3000,
        http://localhost:4000,
        http://localhost:5000,
        http://localhost:5500,
        http://127.0.0.1:4000,
        http://127.0.0.1:5000,
        http://127.0.0.1:5500,
        https://huongsaccodo.io.vn
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-ta-edu-01}
    volumes:
      - ./rule:/app/rule:ro
    depends_on:
      kyc-db:
        condition: service_healthy
    ports:
      - "4001:4001"
    restart: unless-stopped
volumes:
  kyc-postgres:
